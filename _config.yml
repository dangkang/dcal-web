# Jekyll config — used by GitHub Pages.
# Since index.html / privacy.html / terms.html are plain HTML, Jekyll just
# passes them through. _config.yml mainly tells Pages "treat this folder
# as the site root".

title: dCal
description: ローカル完結のスケジュール帳
url: https://dcal.app

# Disable Jekyll's default theme (we ship custom CSS).
theme: null
plugins: []

# Tell GitHub Pages not to try processing _*.html or assets through Jekyll
# templates, since they're already plain HTML.
defaults:
  - scope:
      path: ""
    values:
      layout: null

# Files / folders to ignore.
exclude:
  - README.md
